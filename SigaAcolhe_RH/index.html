<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SigaAcolhe RH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-logo">🧠💚</div>
        <h1 class="login-title">SigaAcolhe</h1>
        <p class="login-subtitle">Painel de Gestão RH — Triagem em Saúde Mental</p>

        <div id="login-error" class="login-error" style="display:none;"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="password">Senha de Acesso</label>
                <input type="password" id="password" placeholder="Digite a senha do RH" required autofocus>
            </div>
            <button type="submit" class="btn-primary">Entrar no Painel</button>
        </form>

        <p class="login-footer">Em caso de emergência, ligue 188 (CVV)</p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
